<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nontonin — Movies</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pink-50: #FDF0F5;
      --pink-100: #FCE4ED;
      --pink-200: #F4B8CC;
      --pink-400: #E8859F;
      --pink-600: #C95A7A;
      --pink-800: #8B2F4E;
      --gray-50: #F9F6F7;
      --gray-100: #F0EBEE;
      --gray-300: #D5C8CE;
      --gray-500: #9C8D93;
      --gray-700: #5C4F55;
      --gray-900: #2C2028;
      --white: #ffffff;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--gray-50);
      color: var(--gray-900);
      min-height: 100vh;
    }

    .app {
      display: grid;
      grid-template-columns: 210px 1fr 270px;
      min-height: 100vh;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      background: var(--white);
      border-right: 1px solid var(--pink-200);
      padding: 24px 0;
      display: flex;
      flex-direction: column;
      position: sticky;
      top: 0;
      height: 100vh;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 20px 28px;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: var(--pink-400);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 18px;
    }

    .logo-name {
      font-size: 16px;
      font-weight: 600;
      color: var(--pink-600);
    }

    .nav-section {
      padding: 0 12px 20px;
    }

    .nav-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--pink-200);
      padding: 0 8px 8px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 10px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      color: var(--gray-500);
      cursor: pointer;
      transition: all 0.15s;
      margin-bottom: 2px;
      text-decoration: none;
    }

    .nav-item:hover { background: var(--pink-50); color: var(--pink-600); }
    .nav-item.active { background: var(--pink-100); color: var(--pink-600); font-weight: 500; }
    .nav-item i { font-size: 17px; }

    /* ── MAIN ── */
    .main {
      padding: 28px 28px 48px;
      overflow-y: auto;
    }

    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .page-title { font-size: 20px; font-weight: 600; }
    .page-sub { font-size: 13px; color: var(--gray-500); margin-top: 2px; }

    /* featured */
    .featured {
      background: var(--white);
      border-radius: var(--radius-lg);
      border: 1px solid var(--pink-200);
      padding: 28px;
      margin-bottom: 28px;
      display: grid;
      grid-template-columns: 1fr 140px;
      gap: 24px;
      align-items: center;
    }

    .featured-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: var(--pink-100);
      color: var(--pink-600);
      font-size: 11px;
      font-weight: 500;
      padding: 4px 10px;
      border-radius: 20px;
      margin-bottom: 12px;
    }

    .featured-title {
      font-size: 24px;
      font-weight: 600;
      line-height: 1.3;
      margin-bottom: 6px;
    }

    .featured-meta {
      font-size: 13px;
      color: var(--gray-500);
      margin-bottom: 10px;
    }

    .featured-desc {
      font-size: 13px;
      color: var(--gray-700);
      line-height: 1.7;
      margin-bottom: 18px;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .featured-poster {
      width: 140px;
      height: 140px;
      border-radius: var(--radius-md);
      background: var(--pink-100);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--pink-400);
      font-size: 44px;
    }

    /* movie grid */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .section-title { font-size: 15px; font-weight: 600; }

    .movie-count {
      font-size: 12px;
      color: var(--gray-500);
      background: var(--gray-100);
      padding: 3px 10px;
      border-radius: 20px;
    }

    .movie-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 16px;
    }

    .movie-card {
      background: var(--white);
      border-radius: var(--radius-md);
      border: 1px solid var(--pink-100);
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.15s, border-color 0.15s;
    }

    .movie-card:hover { transform: translateY(-3px); border-color: var(--pink-400); }

    .movie-poster {
      height: 110px;
      background: var(--pink-50);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--pink-300, #F4B8CC);
      font-size: 32px;
      border-bottom: 1px solid var(--pink-100);
    }

    .movie-info { padding: 10px 12px 8px; }

    .movie-title {
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .movie-genre {
      font-size: 11px;
      color: var(--pink-600);
      margin-bottom: 6px;
    }

    .movie-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .movie-year { font-size: 11px; color: var(--gray-500); }

    .delete-btn {
      background: none;
      border: none;
      color: var(--gray-300);
      cursor: pointer;
      padding: 2px 4px;
      border-radius: 4px;
      font-size: 14px;
      transition: all 0.15s;
    }

    .delete-btn:hover { color: #E24B4A; background: #FFEBEE; }

    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 48px 20px;
      color: var(--gray-500);
    }

    .empty-state i { font-size: 40px; display: block; margin-bottom: 10px; color: var(--pink-200); }
    .empty-state p { font-size: 14px; }

    /* ── RIGHT SIDEBAR ── */
    .rightbar {
      background: var(--white);
      border-left: 1px solid var(--pink-200);
      padding: 28px 20px;
      overflow-y: auto;
    }

    .search-wrap {
      position: relative;
      margin-bottom: 28px;
    }

    .search-wrap input {
      width: 100%;
      padding: 10px 36px 10px 14px;
      border: 1px solid var(--pink-200);
      border-radius: 10px;
      font-size: 13px;
      font-family: 'Inter', sans-serif;
      background: var(--pink-50);
      color: var(--gray-900);
      outline: none;
      transition: border-color 0.15s;
    }

    .search-wrap input:focus { border-color: var(--pink-400); background: var(--white); }
    .search-wrap i { position: absolute; right: 11px; top: 50%; transform: translateY(-50%); color: var(--pink-400); font-size: 16px; pointer-events: none; }

    .form-box {
      background: var(--pink-50);
      border: 1px solid var(--pink-100);
      border-radius: var(--radius-md);
      padding: 18px;
    }

    .form-heading {
      font-size: 14px;
      font-weight: 600;
      color: var(--pink-600);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .form-group { margin-bottom: 12px; }

    .form-group label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      color: var(--gray-500);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 5px;
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid var(--pink-200);
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-family: 'Inter', sans-serif;
      background: var(--white);
      color: var(--gray-900);
      outline: none;
      transition: border-color 0.15s;
    }

    .form-group input:focus,
    .form-group textarea:focus { border-color: var(--pink-400); }

    .form-group textarea { resize: vertical; min-height: 72px; line-height: 1.5; }

    .btn-submit {
      width: 100%;
      background: var(--pink-400);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      padding: 11px;
      font-size: 13px;
      font-weight: 500;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      margin-top: 6px;
      transition: background 0.15s;
    }

    .btn-submit:hover { background: var(--pink-600); }
    .btn-submit:active { transform: scale(0.98); }

    .toast {
      margin-top: 12px;
      font-size: 12px;
      padding: 9px 12px;
      border-radius: var(--radius-sm);
      display: none;
    }

    .toast.success { display: block; background: #E8F5E9; color: #2E7D32; }
    .toast.error { display: block; background: #FFEBEE; color: #C62828; }
  </style>
</head>
<body>

<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="logo">
      <div class="logo-icon"><i class="ti ti-movie"></i></div>
      <span class="logo-name">Nontonin</span>
    </div>
    <div class="nav-section">
      <div class="nav-label">Menu</div>
      <a class="nav-item active" href="index.html"><i class="ti ti-home"></i> Discover</a>
      <a class="nav-item" href="#"><i class="ti ti-trending-up"></i> Trending</a>
      <a class="nav-item" href="#"><i class="ti ti-category"></i> Genre</a>
    </div>
    <div class="nav-section">
      <div class="nav-label">Services</div>
      <a class="nav-item" href="../1-user-service/index.html"><i class="ti ti-user"></i> Users</a>
      <a class="nav-item active" href="../2-movie-service/index.html"><i class="ti ti-movie"></i> Movies</a>
      <a class="nav-item" href="../3-review-service/index.html"><i class="ti ti-star"></i> Reviews</a>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="page-header">
      <div>
        <div class="page-title">Movies</div>
        <div class="page-sub">Browse and manage the movie catalogue</div>
      </div>
    </div>

    <!-- Featured -->
    <div class="featured" id="featured-card">
      <div>
        <div class="featured-badge"><i class="ti ti-star-filled" style="font-size:11px;"></i> Featured</div>
        <div class="featured-title" id="feat-title">Connecting...</div>
        <div class="featured-meta" id="feat-meta"></div>
        <div class="featured-desc" id="feat-desc">Fetching movies from movie-service...</div>
      </div>
      <div class="featured-poster"><i class="ti ti-movie"></i></div>
    </div>

    <!-- Grid -->
    <div class="section-header">
      <span class="section-title">All Movies</span>
      <span class="movie-count" id="movie-count">0 movies</span>
    </div>
    <div class="movie-grid" id="movie-grid">
      <div class="empty-state">
        <i class="ti ti-loader"></i>
        <p>Loading movies...</p>
      </div>
    </div>
  </main>

  <!-- RIGHT BAR -->
  <aside class="rightbar">
    <div class="search-wrap">
      <input type="text" placeholder="Search movies..." id="search-input" oninput="filterMovies()" />
      <i class="ti ti-search"></i>
    </div>

    <div class="form-box">
      <div class="form-heading"><i class="ti ti-plus"></i> Add Movie</div>

      <div class="form-group">
        <label>Title *</label>
        <input type="text" id="f-title" placeholder="e.g. Inception" />
      </div>
      <div class="form-group">
        <label>Genre</label>
        <input type="text" id="f-genre" placeholder="e.g. Sci-Fi" />
      </div>
      <div class="form-group">
        <label>Director</label>
        <input type="text" id="f-director" placeholder="e.g. Christopher Nolan" />
      </div>
      <div class="form-group">
        <label>Release Year</label>
        <input type="number" id="f-year" placeholder="e.g. 2010" min="1900" max="2099" />
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea id="f-desc" placeholder="Brief description..."></textarea>
      </div>
      <div class="form-group">
        <label>Poster URL</label>
        <input type="text" id="f-poster" placeholder="https://..." />
      </div>

      <button class="btn-submit" onclick="addMovie()">Add Movie</button>
      <div class="toast" id="toast"></div>
    </div>
  </aside>

</div>

<script>
  const GQL = 'http://localhost:3002/graphql';
  let allMovies = [];

  async function gql(query, variables = {}) {
    const res = await fetch(GQL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query, variables })
    });
    return res.json();
  }

  async function loadMovies() {
    try {
      const data = await gql(`{
        movies {
          id title genre director release_year description poster_url
        }
      }`);
      allMovies = data.data?.movies || [];
      renderMovies(allMovies);
      if (allMovies.length > 0) setFeatured(allMovies[0]);
      else {
        document.getElementById('feat-title').textContent = 'No movies yet';
        document.getElementById('feat-desc').textContent = 'Add the first movie using the form on the right.';
      }
    } catch (e) {
      document.getElementById('feat-title').textContent = 'Service offline';
      document.getElementById('feat-desc').textContent = 'Make sure movie-service is running at localhost:3002';
      document.getElementById('movie-grid').innerHTML = `
        <div class="empty-state">
          <i class="ti ti-wifi-off"></i>
          <p>Could not connect to movie-service</p>
        </div>`;
    }
  }

  function setFeatured(movie) {
    document.getElementById('feat-title').textContent = movie.title;
    document.getElementById('feat-meta').textContent = [movie.director, movie.genre, movie.release_year].filter(Boolean).join(' · ');
    document.getElementById('feat-desc').textContent = movie.description || 'No description available.';
  }

  function renderMovies(movies) {
    const grid = document.getElementById('movie-grid');
    document.getElementById('movie-count').textContent = movies.length + ' movie' + (movies.length !== 1 ? 's' : '');

    if (movies.length === 0) {
      grid.innerHTML = `
        <div class="empty-state">
          <i class="ti ti-database-off"></i>
          <p>No movies found</p>
        </div>`;
      return;
    }

    grid.innerHTML = movies.map(m => `
      <div class="movie-card" onclick='setFeatured(${JSON.stringify(m)})'>
        <div class="movie-poster">
          ${m.poster_url
            ? `<img src="${m.poster_url}" alt="${m.title}" style="width:100%;height:100%;object-fit:cover;" onerror="this.parentElement.innerHTML='<i class=\\'ti ti-movie\\'></i>'" />`
            : '<i class="ti ti-movie"></i>'
          }
        </div>
        <div class="movie-info">
          <div class="movie-title" title="${m.title}">${m.title}</div>
          <div class="movie-genre">${m.genre || '—'}</div>
          <div class="movie-footer">
            <span class="movie-year">${m.release_year || ''}</span>
            <button class="delete-btn" onclick="event.stopPropagation(); deleteMovie(${m.id}, '${m.title.replace(/'/g, "\\'")}')" aria-label="Delete ${m.title}">
              <i class="ti ti-trash"></i>
            </button>
          </div>
        </div>
      </div>
    `).join('');
  }

  function filterMovies() {
    const q = document.getElementById('search-input').value.toLowerCase();
    const filtered = allMovies.filter(m =>
      m.title.toLowerCase().includes(q) ||
      (m.genre || '').toLowerCase().includes(q) ||
      (m.director || '').toLowerCase().includes(q)
    );
    renderMovies(filtered);
  }

  async function addMovie() {
    const title = document.getElementById('f-title').value.trim();
    if (!title) { showToast('Title is required!', 'error'); return; }

    const genre = document.getElementById('f-genre').value.trim() || null;
    const director = document.getElementById('f-director').value.trim() || null;
    const release_year = parseInt(document.getElementById('f-year').value) || null;
    const description = document.getElementById('f-desc').value.trim() || null;
    const poster_url = document.getElementById('f-poster').value.trim() || null;

    try {
      const data = await gql(`
        mutation($title:String! $description:String $genre:String $release_year:Int $director:String $poster_url:String) {
          addMovie(title:$title description:$description genre:$genre release_year:$release_year director:$director poster_url:$poster_url) {
            id title genre director release_year description poster_url
          }
        }
      `, { title, description, genre, release_year, director, poster_url });

      if (data.errors) { showToast(data.errors[0].message, 'error'); return; }

      const newMovie = data.data.addMovie;
      allMovies.unshift(newMovie);
      renderMovies(allMovies);
      setFeatured(newMovie);

      ['f-title','f-genre','f-director','f-year','f-desc','f-poster'].forEach(id => {
        document.getElementById(id).value = '';
      });
      showToast('Movie added!', 'success');
    } catch (e) {
      showToast('Failed to connect to service.', 'error');
    }
  }

  async function deleteMovie(id, title) {
    if (!confirm('Delete "' + title + '"?')) return;
    try {
      const data = await gql(`mutation($id:ID!) { deleteMovie(id:$id) }`, { id: String(id) });
      if (data.errors) { showToast(data.errors[0].message, 'error'); return; }
      allMovies = allMovies.filter(m => m.id != id);
      renderMovies(allMovies);
      if (allMovies.length > 0) setFeatured(allMovies[0]);
      else {
        document.getElementById('feat-title').textContent = 'No movies yet';
        document.getElementById('feat-desc').textContent = 'Add the first movie using the form.';
      }
      showToast('Movie deleted.', 'success');
    } catch (e) {
      showToast('Failed to delete.', 'error');
    }
  }

  function showToast(msg, type) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'toast ' + type;
    setTimeout(() => el.className = 'toast', 3000);
  }

  loadMovies();
</script>

</body>
</html>

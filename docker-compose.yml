services:

  mysql-user:
    image: mysql:8.0
    container_name: nontonin-mysql-user
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: nontonin_user
    ports:
      - "3307:3306"
    volumes:
      - mysql_user_data:/var/lib/mysql
      - ./1-user-service/init-user.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

  mysql-movie:
    image: mysql:8.0
    container_name: nontonin-mysql-movie
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: nontonin_movies
    ports:
      - "3308:3306"
    volumes:
      - mysql_movie_data:/var/lib/mysql
      - ./2-movie-service/init-movie.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

  mysql-review:
    image: mysql:8.0
    container_name: nontonin-mysql-review
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: nontonin_review
    ports:
      - "3309:3306"
    volumes:
      - mysql_review_data:/var/lib/mysql
      - ./3-review-service/init-review.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

  user-service:
    build: ./1-user-service
    container_name: nontonin-user-service
    restart: on-failure
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      DB_HOST: mysql-user
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: nontonin_user
    depends_on:
      mysql-user:
        condition: service_healthy

  movie-service:
    build: ./2-movie-service
    container_name: nontonin-movie-service
    restart: on-failure
    ports:
      - "3002:3002"
    environment:
      PORT: 3002
      DB_HOST: mysql-movie
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: nontonin_movies
    depends_on:
      mysql-movie:
        condition: service_healthy

  review-service:
    build: ./3-review-service
    container_name: nontonin-review-service
    restart: on-failure
    ports:
      - "3003:3003"
    environment:
      PORT: 3003
      DB_HOST: mysql-review
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: nontonin_review
    depends_on:
      mysql-review:
        condition: service_healthy

volumes:
  mysql_user_data:
  mysql_movie_data:
  mysql_review_data: